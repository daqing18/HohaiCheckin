name: Hohai Daily Check-in

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 00:05 Asia/Shanghai
    - cron: '5 16 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run check-in
        env:
          HOHAI_UN: ${{ secrets.HOHAI_UN }}
          HOHAI_PW: ${{ secrets.HOHAI_PW }}
          HOHAI_TGTK: ${{ secrets.HOHAI_TGTK }}
          HOHAI_TGID: ${{ secrets.HOHAI_TGID }}
          HEADLESS: 'true'
          STRICT_PROXY: 'true'
          # Optional override. Keep JSON array string.
          HTTP_PROXY_POOL: ${{ secrets.HTTP_PROXY_POOL }}
        run: python checkin.py

      - name: Upload JSON artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: hohai-checkin-json
          path: artifacts/*.json
          if-no-files-found: ignore
