name: Hohai Check-in (Manual via self-hosted)

on:
  workflow_dispatch:

jobs:
  checkin:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run check-in directly
        env:
          HOHAI_UN: ${{ secrets.HOHAI_UN }}
          HOHAI_PW: ${{ secrets.HOHAI_PW }}
          HOHAI_TGTK: ${{ secrets.HOHAI_TGTK }}
          HOHAI_TGID: ${{ secrets.HOHAI_TGID }}
          HEADLESS: 'true'
        run: |
          python3 --version
          python3 -m pip install --break-system-packages -r requirements.txt
          python3 -m playwright install chromium
          python3 checkin.py
