name: Hohai Daily Check-in

on:
  schedule:
    # UTC time; 00:08 UTC = 08:08 Asia/Shanghai
    - cron: '8 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Python version (self-hosted)
        run: |
          python3 --version

      - name: Install dependencies (venv)
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run check-in
        env:
          HOHAI_UN: ${{ secrets.HOHAI_UN }}
          HOHAI_PW: ${{ secrets.HOHAI_PW }}
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
          HOHAI_TGTK: ${{ secrets.HOHAI_TGTK }}
          HOHAI_TGID: ${{ secrets.HOHAI_TGID }}
          HEADLESS: 'true'
        run: |
          . .venv/bin/activate
          python checkin.py

      - name: Upload JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hohai-checkin-json
          path: artifacts/*.json
          if-no-files-found: ignore
